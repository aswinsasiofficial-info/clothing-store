{% extends "store/base.html" %}
{% block content %}
<div class="container my-5">

  <div class="row justify-content-center">
    <div class="col-md-8">

      <div class="border p-4 mb-4 bg-light">
        <h1 class="h5 fw-semibold mb-2">Order placed successfully</h1>
        <p class="mb-1">
          Your order ID is <strong>{{ order_number }}</strong>
        </p>
        <p class="text-muted mb-0">
          A confirmation message has been generated for your order.
        </p>
      </div>

      <div class="d-flex gap-3">
        <a href="{% url 'store:products' %}" 
           class="btn btn-outline-primary px-4">
          Continue Shopping
        </a>

        <a href="{% url 'store:download_invoice' order_number %}" 
           class="btn btn-primary px-4">
          Download Invoice
        </a>
      </div>

    </div>
  </div>

</div>
{% endblock %}
