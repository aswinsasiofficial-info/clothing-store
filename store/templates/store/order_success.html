{% extends "store/base.html" %}
{% block content %}
<div class="text-center py-5">
  <h1>Order Placed!</h1>
  <p>Your order number is <code>{{ order_number }}</code></p>
  <a href="{% url 'store:products' %}" class="btn btn-primary px-4 py-2 me-2"
    style="min-width: 180px; font-size: 16px;">
    Continue Shopping
  </a>

  <a href="{% url 'store:download_invoice' order_number %}" class="btn btn-primary px-4 py-2"
    style="min-width: 180px; font-size: 16px;">
    Download Invoice
  </a>


</div>
{% endblock %}
