{% extends "store/base.html" %}
{% block content %}
<div class="container my-5">
  <div class="row g-5 align-items-start">

    <!-- Product Image -->
    <div class="col-md-6">
      {% if product.image_list %}
      <div class="border rounded p-3 bg-light">
        <img src="{{ product.image_list.0 }}" 
             class="img-fluid rounded mx-auto d-block" 
             alt="{{ product.name }}">
      </div>
      {% endif %}
    </div>

    <!-- Product Details -->
    <div class="col-md-6">
      <h1 class="fw-semibold mb-3">{{ product.name }}</h1>

      <p class="fs-4 fw-bold text-dark mb-3">
        ₹{{ product.price }}
      </p>

      <p class="text-muted mb-4" style="line-height: 1.7;">
        {{ product.description }}
      </p>

      <form method="post" class="border-top pt-4">
        {% csrf_token %}
        <input type="hidden" name="action" value="add">

        {% if product.size_list %}
        <div class="mb-3">
          <label class="form-label fw-medium">Size</label>
          <select name="size" class="form-select w-50">
            <option value="">Select size</option>
            {% for s in product.size_list %}
            <option value="{{ s }}">{{ s }}</option>
            {% endfor %}
          </select>
        </div>
        {% endif %}

        <div class="mb-4">
          <label class="form-label fw-medium">Quantity</label>
          <input type="number" 
                 name="quantity" 
                 value="1" 
                 min="1" 
                 class="form-control w-25">
        </div>

        <div class="d-flex align-items-center gap-2">
          <button type="submit" class="btn btn-dark px-4">
            Add to Cart
          </button>

          <a href="{% url 'store:wishlist_add' product.id %}" 
             class="btn btn-outline-danger"
             title="Add to Wishlist">
            ❤️
          </a>
        </div>
      </form>
    </div>

  </div>
</div>
{% endblock %}
